# canton-devrel nginx — wallet + scan + validator API proxy

# App User Wallet (wallet.localhost:2000, ans.localhost:2000)
server {
    listen 2000;
    server_name wallet.localhost ans.localhost;

    location /api/validator/ {
        proxy_pass http://splice:5003/api/validator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://splice:2080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# App Provider Wallet (wallet.localhost:3000)
server {
    listen 3000;
    server_name wallet.localhost;

    location /api/validator/ {
        proxy_pass http://splice:6003/api/validator/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://splice:3080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Scan + SV UI (scan.localhost:4000, sv.localhost:4000)
server {
    listen 4000;
    server_name scan.localhost sv.localhost;

    location /api/scan/ {
        proxy_pass http://splice:5012/api/scan/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://splice:4080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Validator APIs (exposed directly for API calls)
server {
    listen 2903;
    location / {
        proxy_pass http://splice:2903/;
        proxy_set_header Host $host;
    }
}

server {
    listen 3903;
    location / {
        proxy_pass http://splice:3903/;
        proxy_set_header Host $host;
    }
}

server {
    listen 4903;
    location / {
        proxy_pass http://splice:4903/;
        proxy_set_header Host $host;
    }
}
