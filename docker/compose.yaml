# canton-devrel: Stripped Canton LocalNet
# No reference app. Pure Canton Network: 3 validators + synchronizer + wallets + keycloak + PQS
# All images are from europe-docker.pkg.dev/da-images/public — no auth required.

name: canton-devrel

x-canton-common: &canton-common
  image: ${SPLICE_REGISTRY}/splice-node:${IMAGE_TAG}
  restart: unless-stopped

x-splice-common: &splice-common
  image: ${SPLICE_REGISTRY}/splice-node:${IMAGE_TAG}
  restart: unless-stopped

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:14
    container_name: canton-devrel-postgres
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEMORY_LIMIT}
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: >-
        canton-sv,canton-app-provider,canton-app-user,
        splice-sv,splice-app-provider,splice-app-user,
        keycloak,pqs-app-provider,pqs-app-user
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Keycloak (OAuth2) ───────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.6
    container_name: canton-devrel-keycloak
    restart: unless-stopped
    mem_limit: ${KEYCLOAK_MEMORY_LIMIT}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${DB_USER}
      KC_DB_PASSWORD: ${DB_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: ["start", "--import-realm"]
    volumes:
      - ./docker/keycloak/realms:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9000/health/ready || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s

  nginx-keycloak:
    image: nginx:1.25-alpine
    container_name: canton-devrel-nginx-keycloak
    restart: unless-stopped
    mem_limit: ${NGINX_MEMORY_LIMIT}
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - "${KEYCLOAK_PORT}:8082"
    volumes:
      - ./docker/nginx/keycloak.conf:/etc/nginx/conf.d/default.conf:ro

  # ─── Canton (participant nodes) ───────────────────────────────────────────────
  canton:
    <<: *canton-common
    container_name: canton-devrel-canton
    mem_limit: ${CANTON_MEMORY_LIMIT}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CANTON_DB_HOST: postgres
      CANTON_DB_PORT: "5432"
      CANTON_DB_USER: ${DB_USER}
      CANTON_DB_PASSWORD: ${DB_PASSWORD}
      AUTH_MODE: ${AUTH_MODE}
      KEYCLOAK_URL: http://nginx-keycloak:8082
      SV_LEDGER_API_PORT: "4901"
      APP_PROVIDER_LEDGER_API_PORT: "3901"
      APP_USER_LEDGER_API_PORT: "2901"
    ports:
      # Super Validator
      - "4901:4901"   # Ledger API
      - "4902:4902"   # Admin API
      - "4961:4961"   # gRPC Health
      # App Provider
      - "3901:3901"   # Ledger API
      - "3902:3902"   # Admin API
      - "3961:3961"   # gRPC Health
      # App User
      - "2901:2901"   # Ledger API
      - "2902:2902"   # Admin API
      - "2961:2961"   # gRPC Health
    volumes:
      - ./docker/canton/canton.conf:/app/canton.conf:ro
      - canton-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4900/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  # ─── Splice (validators + synchronizer + wallet UIs) ─────────────────────────
  splice:
    <<: *splice-common
    container_name: canton-devrel-splice
    mem_limit: ${SPLICE_MEMORY_LIMIT}
    depends_on:
      canton:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      CANTON_HOST: canton
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_MODE: ${AUTH_MODE}
      KEYCLOAK_URL: http://nginx-keycloak:8082
      IMAGE_TAG: ${IMAGE_TAG}
    volumes:
      - ./docker/splice/splice.conf:/app/splice.conf:ro
      - splice-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:3903/api/validator/readyz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 90s

  # ─── Onboarding (one-shot init: creates parties, users, uploads Splice DARs) ─
  splice-onboarding:
    image: ${SPLICE_REGISTRY}/splice-node:${IMAGE_TAG}
    container_name: canton-devrel-onboarding
    restart: "no"
    depends_on:
      splice:
        condition: service_healthy
    environment:
      CANTON_HOST: canton
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_MODE: ${AUTH_MODE}
      KEYCLOAK_URL: http://nginx-keycloak:8082
    volumes:
      - ./docker/onboarding/onboard.sh:/app/scripts/on/canton-devrel.sh:ro
      - onboarding-data:/onboarding

  # ─── JSON Ledger API (HTTP gateway) ──────────────────────────────────────────
  json-api-sv:
    image: ${SPLICE_REGISTRY}/http-json:${IMAGE_TAG}
    container_name: canton-devrel-json-sv
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      splice-onboarding:
        condition: service_completed_successfully
    environment:
      LEDGER_HOST: canton
      LEDGER_PORT: "4901"
      AUTH_MODE: ${AUTH_MODE}
      KEYCLOAK_URL: http://nginx-keycloak:8082
      KEYCLOAK_REALM: sv
    ports:
      - "4975:7575"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:7575/readyz || exit 1"]
      interval: 10s
      retries: 15

  json-api-app-provider:
    image: ${SPLICE_REGISTRY}/http-json:${IMAGE_TAG}
    container_name: canton-devrel-json-provider
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      splice-onboarding:
        condition: service_completed_successfully
    environment:
      LEDGER_HOST: canton
      LEDGER_PORT: "3901"
      AUTH_MODE: ${AUTH_MODE}
      KEYCLOAK_URL: http://nginx-keycloak:8082
      KEYCLOAK_REALM: AppProvider
    ports:
      - "3975:7575"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:7575/readyz || exit 1"]
      interval: 10s
      retries: 15

  json-api-app-user:
    image: ${SPLICE_REGISTRY}/http-json:${IMAGE_TAG}
    container_name: canton-devrel-json-user
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      splice-onboarding:
        condition: service_completed_successfully
    environment:
      LEDGER_HOST: canton
      LEDGER_PORT: "2901"
      AUTH_MODE: ${AUTH_MODE}
      KEYCLOAK_URL: http://nginx-keycloak:8082
      KEYCLOAK_REALM: AppUser
    ports:
      - "2975:7575"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:7575/readyz || exit 1"]
      interval: 10s
      retries: 15

  # ─── PQS (Participant Query Store) ───────────────────────────────────────────
  pqs-app-provider:
    image: ${SPLICE_REGISTRY}/participant-query-store:${IMAGE_TAG}
    container_name: canton-devrel-pqs-provider
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      splice-onboarding:
        condition: service_completed_successfully
    environment:
      LEDGER_HOST: canton
      LEDGER_PORT: "3901"
      PQS_DB_HOST: postgres
      PQS_DB_PORT: "5432"
      PQS_DB_USER: ${DB_USER}
      PQS_DB_PASSWORD: ${DB_PASSWORD}
      PQS_DB_NAME: pqs-app-provider
      AUTH_MODE: ${AUTH_MODE}
      KEYCLOAK_URL: http://nginx-keycloak:8082
      KEYCLOAK_REALM: AppProvider

  pqs-app-user:
    image: ${SPLICE_REGISTRY}/participant-query-store:${IMAGE_TAG}
    container_name: canton-devrel-pqs-user
    restart: unless-stopped
    mem_limit: 512m
    depends_on:
      splice-onboarding:
        condition: service_completed_successfully
    environment:
      LEDGER_HOST: canton
      LEDGER_PORT: "2901"
      PQS_DB_HOST: postgres
      PQS_DB_PORT: "5432"
      PQS_DB_USER: ${DB_USER}
      PQS_DB_PASSWORD: ${DB_PASSWORD}
      PQS_DB_NAME: pqs-app-user
      AUTH_MODE: ${AUTH_MODE}
      KEYCLOAK_URL: http://nginx-keycloak:8082
      KEYCLOAK_REALM: AppUser

  # ─── nginx (wallet + scan UI proxy) ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: canton-devrel-nginx
    restart: unless-stopped
    mem_limit: ${NGINX_MEMORY_LIMIT}
    depends_on:
      splice:
        condition: service_healthy
    ports:
      - "${APP_USER_UI_PORT}:${APP_USER_UI_PORT}"     # wallet.localhost:2000
      - "${APP_PROVIDER_UI_PORT}:${APP_PROVIDER_UI_PORT}" # wallet.localhost:3000
      - "${SV_UI_PORT}:${SV_UI_PORT}"                 # scan.localhost:4000
      - "2903:2903"   # App User Validator API
      - "3903:3903"   # App Provider Validator API
      - "4903:4903"   # SV Validator API
    volumes:
      - ./docker/nginx/localnet.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  canton-data:
  splice-data:
  onboarding-data:
